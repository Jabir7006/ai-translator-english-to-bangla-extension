<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            padding: 16px;
            background: #1e1e2e;
            color: #cdd6f4;
            font-family: system-ui, sans-serif;
            margin: 0;
        }
        h3 {
            margin-top: 0;
            margin-bottom: 12px;
            color: #cba6f7;
            font-size: 16px;
        }
        textarea {
            width: 100%;
            height: 100px;
            background: #313244;
            color: #cdd6f4;
            border: 1px solid #45475a;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 12px;
        }
        textarea:focus {
            outline: none;
            border-color: #cba6f7;
        }
        button {
            width: 100%;
            background: #cba6f7;
            color: #11111b;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background: #b4befe;
        }
        button:active {
            transform: scale(0.98);
        }
        #loader {
            display: none;
            text-align: center;
            margin-top: 12px;
            color: #89b4fa;
            font-size: 14px;
        }
        #result {
            margin-top: 16px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            border-top: 1px solid #313244;
            padding-top: 12px;
            display: none;
        }
        #result b {
            color: #f9e2af;
        }
        .tabs {
            display: flex;
            background: #313244;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 12px;
            border: 1px solid #45475a;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 6px 0;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            color: #a6adc8;
            user-select: none;
            transition: all 0.2s;
        }
        .tab:hover {
            color: #cdd6f4;
        }
        .tab.active {
            background: #cba6f7;
            color: #11111b;
        }
    </style>
</head>
<body>
    <h3>✨ AI Text Translator</h3>
    
    <div class="tabs">
        <div class="tab active" data-mode="en-bn">EN ➡️ BN</div>
        <div class="tab" data-mode="bn-en">Banglish ➡️ EN</div>
    </div>

    <textarea id="inputText" placeholder="Paste or type text here..."></textarea>
    <button id="translateBtn">Translate</button>
    <div id="loader">🤖 অনুবাদ করছি...</div>
    <div id="result"></div>

    <script src="popup.js"></script>
</body>
</html>
